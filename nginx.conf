worker_processes  auto;
pid /run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  types { application/javascript  js mjs; text/css css; text/html html; application/json json; image/png png; image/jpeg jpg jpeg; image/svg+xml svg; image/x-icon ico; font/woff2 woff2; font/ttf ttf; }
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types text/plain text/css text/xml application/javascript application/json application/xml text/javascript;
  server { listen 80; server_name _; root /usr/share/nginx/html; location / { try_files $uri $uri/ /index.html; } location = /index.html { add_header Cache-Control "no-cache, no-store, must-revalidate"; add_header Pragma "no-cache"; add_header Expires 0; } location ~* \.(js|css|mjs|png|jpg|jpeg|webp|gif|svg|ico|woff2?|ttf)$ { add_header Cache-Control "public, max-age=2592000, immutable"; expires 30d; } location ~* \.(json|md)$ { add_header Cache-Control "no-cache"; expires -1; } } }
