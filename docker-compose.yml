services:
  api:
    image: node:20-alpine
    container_name: web_app_api
    restart: unless-stopped
    working_dir: /app
    # one-time migration from legacy calvybots_api_data → launchpad_api_data when needed
    command: sh -c "mkdir -p /data; if [ ! -f /data/widgets.json ]; then if [ -f /legacy-data/widgets.json ]; then cp -n /legacy-data/widgets.json /data/widgets.json; fi; if [ ! -f /data/widgets.json ] && [ -f /seed-data/widgets.json ]; then cp -n /seed-data/widgets.json /data/widgets.json; fi; fi; npm install && node server.js"
    volumes:
      - /mnt/data/web_app/api:/app
      - /mnt/data/web_app/data:/seed-data:ro
      - calvybots_api_data:/legacy-data:ro
      - launchpad_api_data:/data
      - /mnt/data/web_app/data/config.json:/data/config.json:ro
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000

  web:
    image: nginx:alpine
    container_name: web_app
    restart: unless-stopped
    ports:
      - "8033:80"
    volumes:
      - /mnt/data/web_app:/usr/share/nginx/html:ro
      - /mnt/data/web_app/nginx-site.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  calvybots_api_data:
  launchpad_api_data:
