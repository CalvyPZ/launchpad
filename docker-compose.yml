services:
  api:
    image: node:20-alpine
    container_name: web_app_api
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - /mnt/data/web_app/api:/app
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000

  web:
    image: nginx:alpine
    container_name: web_app
    restart: unless-stopped
    ports:
      - "8033:80"
    volumes:
      - /mnt/data/web_app:/usr/share/nginx/html:ro
      - /mnt/data/web_app/nginx-site.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
