<!DOCTYPE html>
<html lang="en" x-data="launchpad" x-cloak>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calvy Launchpad</title>
    <meta
      name="description"
      content="Open Calvy Launchpad to start work, see what needs attention, and keep your setup clear from one place."
    />

    <!-- PWA -->
    <meta name="theme-color" content="#1c1c1c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Calvy Launchpad" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind config — must be set before CDN script loads -->
    <script>
      tailwind = {
        config: {
          theme: {
            extend: {
              colors: {
                bg:       "#1c1c1c",
                surface:  "#242424",
                elevated: "#2e2e2e",
                border:   "#3d3d3d",
                accent:   "#2dd4bf",
                "text-1": "#f0f0f0",
                "text-2": "#9a9a9a",
                "text-3": "#5c5c5c",
              },
              fontFamily: {
                sans: ["Outfit", "ui-sans-serif", "system-ui", "sans-serif"],
              },
              borderRadius: {
                card: "10px",
                btn:  "6px",
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="min-h-screen bg-bg text-text-1 antialiased">
    <div class="app-shell min-h-screen flex flex-col">

      <!-- Header -->
      <header class="site-header border-b border-border bg-surface">
        <div class="mx-auto max-w-6xl px-5 py-4">
          <div class="flex items-center gap-4 min-w-0 header-top-row">
            <img
              src="icons/logo-lockup.svg"
              width="248"
              height="36"
              alt=""
              role="presentation"
              class="h-8 w-auto shrink-0 sm:h-9"
            />
            <div class="header-time-readout">
              <p class="header-clock-time" x-text="clockTime"></p>
              <p class="header-clock-date" x-text="clockDate"></p>
            </div>
          </div>
        </div>
      </header>

      <!-- Primary navigation (Home / Tools / Debug) -->
      <nav class="app-nav border-b border-border bg-surface" aria-label="Primary">
        <div class="mx-auto max-w-6xl px-5">
          <div class="flex gap-0 items-center" role="tablist" aria-orientation="horizontal">
            <button
              type="button"
              role="tab"
              class="nav-tab"
              id="tab-home"
              :class="currentPage === 'home' ? 'nav-tab-active' : ''"
              :aria-selected="currentPage === 'home'"
              :tabindex="currentPage === 'home' ? 0 : -1"
              @click="navigateTo('home')"
            >
              Home
            </button>
            <button
              type="button"
              role="button"
              class="nav-tab"
              id="tab-tools"
              :class="currentPage === 'tools' ? 'nav-tab-active' : ''"
              :aria-selected="currentPage === 'tools'"
              :tabindex="currentPage === 'tools' ? 0 : -1"
              @click="navigateTo('tools')"
            >
              Tools
            </button>
            <button
              type="button"
              role="button"
              class="nav-tab nav-edit-tab"
              id="tab-edit"
              :class="editMode ? 'nav-tab-active' : ''"
              :aria-pressed="editMode"
              @click="toggleEditMode()"
              aria-label="Toggle edit mode"
            >
              <span aria-hidden="true" x-text="editMode ? '✖' : '✎'"></span>
              <span x-text="editMode ? 'Done' : 'Edit'"></span>
            </button>
            <button
              type="button"
              role="tab"
              class="nav-tab ml-auto"
              id="tab-debug"
              :class="currentPage === 'debug' ? 'nav-tab-active' : ''"
              :aria-selected="currentPage === 'debug'"
              :tabindex="currentPage === 'debug' ? 0 : -1"
              @click="navigateTo('debug')"
            >
              Debug
            </button>
          </div>
        </div>
      </nav>

      <!-- Edit controls bar (visible in edit mode) -->
      <section class="home-toolbar border-b border-border bg-surface" x-show="editMode" x-cloak>
        <div class="mx-auto max-w-6xl px-5 py-3">
          <div class="home-toolbar-inner">
            <div class="home-toolbar-add relative">
              <button
                type="button"
                x-ref="addWidgetButton"
                class="home-toolbar-btn btn-primary"
                @click="toggleAddWidgetPicker()"
                @keydown="handleAddWidgetTriggerKeydown($event)"
                aria-haspopup="listbox"
                aria-controls="widget-picker-list"
                role="combobox"
                :aria-expanded="addWidgetOpen"
                :aria-activedescendant="addWidgetOpen ? addWidgetActiveOptionId : null"
                aria-label="Add widget"
              >
                <span aria-hidden="true">＋</span>
                Add Widget
              </button>

              <div
                id="widget-picker-list"
                x-ref="addWidgetList"
                class="widget-picker"
                x-show="addWidgetOpen"
                x-transition:enter="transition ease-out duration-100"
                x-transition:enter-start="opacity-0 translate-y-1"
                x-transition:enter-end="opacity-100 translate-y-0"
                x-transition:leave="transition ease-in duration-75"
                x-transition:leave-start="opacity-100 translate-y-0"
                x-transition:leave-end="opacity-0 translate-y-1"
                @click.outside="closeAddWidgetPicker(true)"
                @keydown="handleAddWidgetOptionKeydown($event)"
                role="listbox"
                aria-label="Choose a widget to add"
              >
                <p class="widget-picker-label">Add a widget</p>
                <template x-for="(option, index) in getAddWidgetPickerOptions()" :key="option.type">
                  <button
                    x-ref="addWidgetOption"
                    type="button"
                    role="option"
                    class="widget-picker-option"
                    :class="addWidgetPickerIndex === index ? 'is-active' : ''"
                    :aria-selected="addWidgetPickerIndex === index"
                    :tabindex="addWidgetPickerIndex === index ? 0 : -1"
                    :id="`add-widget-option-${option.type}`"
                    @click="activateAddWidgetOption(index)"
                  >
                    <span aria-hidden="true" x-text="option.icon"></span>
                    <span x-text="option.label"></span>
                  </button>
                </template>
              </div>
            </div>
          </div>

          <p class="edit-mode-hint">
            <strong class="text-text-1">Edit mode:</strong> drag a widget&rsquo;s corner to resize; use widget title fields to rename. Drag <span aria-hidden="true">⠿</span> to reorder.
          </p>
        </div>
      </section>

      <div class="pages-viewport flex-1 min-h-0 w-full">
        <div
          class="pages-track"
          :class="currentPage === 'debug' ? 'pages-track--debug' : currentPage === 'tools' ? 'pages-track--tools' : 'pages-track--home'"
        >
          <!-- Home page -->
          <div class="page-panel" id="page-home" :aria-hidden="currentPage !== 'home'">
            <main class="mx-auto w-full max-w-6xl px-5 py-6">
              <section id="widget-grid" x-ref="widgetGrid" class="widget-grid">
                <!-- Widgets injected by app.js -->
              </section>
            </main>
          </div>

          <!-- Tools page -->
          <div class="page-panel" id="page-tools" :aria-hidden="currentPage !== 'tools'">
            <main class="mx-auto w-full max-w-6xl px-5 py-6">
              <section id="tools-grid" x-ref="toolsGrid" class="widget-grid">
                <!-- Tools widgets injected by app.js -->
              </section>
            </main>
          </div>
          <!-- Debug page -->
          <div class="page-panel" id="page-debug" :aria-hidden="currentPage !== 'debug'">
            <main class="mx-auto w-full max-w-6xl px-5 py-6">
              <section id="debug-grid" x-ref="debugGrid" class="widget-grid">
                <!-- Debug widgets injected by app.js -->
              </section>
            </main>
          </div>
        </div>
      </div>

      <footer
        x-show="currentPage === 'debug'"
        class="widget-sync-strip border-t border-border text-xs text-text-3"
        x-cloak
        aria-live="polite"
        aria-label="Widget sync status"
      >
        <div class="mx-auto max-w-6xl px-5 py-3">
          <div class="widget-sync-strip-grid">
            <p class="widget-sync-strip-row">
              <span class="widget-sync-strip-label">Last sync</span>
              <span class="widget-sync-strip-value" x-text="widgetSyncStripLastSyncLabel()"></span>
            </p>
            <p class="widget-sync-strip-row">
              <span class="widget-sync-strip-label">Sync flag</span>
              <span class="widget-sync-strip-value" x-text="widgetSyncStripSyncStateLabel()"></span>
            </p>
            <p class="widget-sync-strip-row">
              <span class="widget-sync-strip-label">Next outbound</span>
              <span
                class="widget-sync-strip-value"
                x-text="widgetSyncStripNextCountdownLabel()"
              ></span>
            </p>
            <p class="widget-sync-strip-row">
              <span class="widget-sync-strip-label">Last outcome</span>
              <span class="widget-sync-strip-value" x-text="widgetSyncStripPushOutcomeLabel()"></span>
            </p>
            <p class="widget-sync-strip-row">
              <span class="widget-sync-strip-label">Retrieve policy</span>
              <span class="widget-sync-strip-value" x-text="widgetSyncStripRetrieveLabel()"></span>
            </p>
          </div>
        </div>
      </footer>
    </div>

    <!-- Markdown + sanitiser for Sticky Notes preview: globals window.marked, window.DOMPurify (cdnjs UMD builds) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.5/purify.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- App module (must come before Alpine so alpine:init listener registers in time) -->
    <script type="module" src="js/app.js"></script>
    <!-- Alpine — defer keeps it after app.js module in execution order -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Service worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      }
    </script>
  </body>
</html>
